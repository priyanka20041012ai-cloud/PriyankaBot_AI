<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriyankaBot AI | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --input-bg: #111111;
            --accent-blue: #38bdf8;
            --text-gray: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
        }

        .left-panel {
            flex: 1;
            position: relative;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
            border-radius: 0 40px 40px 0;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7));
            z-index: 1;
        }

        .left-content {
            position: relative;
            z-index: 2;
        }

        .brand-logo { font-size: 2.2rem; font-weight: 800; color: white; letter-spacing: -1px; }
        .bottom-tag { color: rgba(255,255,255,0.6); font-size: 0.9rem; position: relative; z-index: 2; }

        .right-panel {
            flex: 1;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .form-box { width: 100%; max-width: 420px; }

        .back-btn {
            width: 45px; height: 45px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; margin-bottom: 40px; cursor: pointer;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #252525;
            transform: translateX(-3px);
        }

        .form-box h1 { color: white; font-size: 2.4rem; font-weight: 700; margin-bottom: 10px; }
        .login-link { color: var(--text-gray); font-size: 0.95rem; margin-bottom: 30px; }
        .login-link span { color: white; font-weight: 600; cursor: pointer; text-decoration: underline; }

        /* Social Login Buttons */
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-btn {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #222;
            padding: 16px 20px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: #1a1a1a;
            border-color: #333;
            transform: translateY(-2px);
        }

        .social-btn img {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #555;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #222;
        }

        .divider span {
            padding: 0 15px;
        }

        .input-field {
            width: 100%; background: var(--input-bg); border: 1px solid #222;
            padding: 18px 20px; border-radius: 15px; color: white; font-size: 1rem;
            margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--accent-blue); background: #161616; }

        .password-field {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            transition: 0.3s;
        }

        .toggle-password:hover {
            color: #999;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%; background: var(--accent-blue); color: black;
            border: none; padding: 18px; border-radius: 15px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .submit-btn:hover { background: white; transform: translateY(-2px); }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer-text { margin-top: 40px; font-size: 0.75rem; color: #444; text-align: center; line-height: 1.5; }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }

        /* Loading spinner */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-blue);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 900px) { 
            .left-panel { display: none; }
            .right-panel { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="left-panel">
            <div class="left-content">
                <div class="brand-logo">PriyankaBot.AI</div>
            </div>
            <div class="bottom-tag">Powered by AI • 2026</div>
        </div>

        <div class="right-panel">
            <div class="form-box">
                <div class="back-btn" onclick="window.location.href='/'">←</div>
                
                <h1>Welcome Back</h1>
                <p class="login-link">Don't have an account? <span onclick="showSignupAlert()">Sign up</span></p>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <!-- Social Login Buttons -->
                <div class="social-buttons">
                    <button class="social-btn" onclick="loginWithGoogle()">
                        <img src="https://www.google.com/favicon.ico" alt="Google">
                        Continue with Google
                    </button>
                    <button class="social-btn" onclick="loginWithGithub()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        Continue with GitHub
                    </button>
                    <button class="social-btn" onclick="loginWithMicrosoft()">
                        <svg width="20" height="20" viewBox="0 0 21 21" fill="none">
                            <rect width="10" height="10" fill="#f25022"/>
                            <rect x="11" width="10" height="10" fill="#7fba00"/>
                            <rect y="11" width="10" height="10" fill="#00a4ef"/>
                            <rect x="11" y="11" width="10" height="10" fill="#ffb900"/>
                        </svg>
                        Continue with Microsoft
                    </button>
                </div>

                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Email/Password Login -->
                <form id="loginForm">
                    <input type="email" id="email" class="input-field" placeholder="Email address" required>
                    
                    <div class="password-field" style="position: relative; margin-bottom: 15px;">
                        <input type="password" id="password" class="input-field" placeholder="Password" required style="margin-bottom: 0; padding-right: 50px;">
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                    </div>

                    <div class="remember-forgot">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password" onclick="showForgotPassword(); return false;">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="loginBtn">
                        <span id="btnText">Log In</span>
                        <span id="btnSpinner" class="spinner"></span>
                        <span id="btnArrow" style="font-size:1.2rem;">→</span>
                    </button>
                </form>

                <p class="footer-text">
                    By continuing, you agree to Nexus AI's <a href="#" style="color: var(--accent-blue); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--accent-blue); text-decoration: none;">Privacy Policy</a>.
                </p>
            </div>
        </div>
    </div>

  <script>
    // Toggle password visibility
    function togglePassword() {
        const passwordField = document.getElementById('password');
        const toggleBtn = document.querySelector('.toggle-password');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            toggleBtn.textContent = 'Hide';
        } else {
            passwordField.type = 'password';
            toggleBtn.textContent = 'Show';
        }
    }

    // Show error message
    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
    }

    // Show success message
    function showSuccess(message) {
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        setTimeout(() => { successDiv.style.display = 'none'; }, 3000);
    }

    // Loading state for email login
    function setLoading(isLoading) {
        const btn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnArrow = document.getElementById('btnArrow');
        
        if (isLoading) {
            btn.disabled = true;
            btnText.textContent = 'Logging in...';
            btnSpinner.style.display = 'block';
            btnArrow.style.display = 'none';
        } else {
            btn.disabled = false;
            btnText.textContent = 'Log In';
            btnSpinner.style.display = 'none';
            btnArrow.style.display = 'inline';
        }
    }

    // ==================== OAUTH LOGIN FUNCTIONS (NOW WORKING!) ====================

    function loginWithGoogle() {
        window.location.href = '/auth/google';
    }

    function loginWithGithub() {
        window.location.href = '/auth/github';
    }

    function loginWithMicrosoft() {
        window.location.href = '/auth/microsoft';
    }

    // ==================== EMAIL/PASSWORD LOGIN (unchanged) ====================

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;

        if (!email || !password) {
            showError('Please fill in all fields');
            return;
        }

        if (password.length < 6) {
            showError('Password must be at least 6 characters');
            return;
        }

        setLoading(true);

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: email.split('@')[0],
                    password: password
                })
            });

            const data = await response.json();

            if (data.status === 'success') {
                localStorage.setItem('user', email.split('@')[0]);
                localStorage.setItem('userEmail', email);
                if (rememberMe) localStorage.setItem('rememberMe', 'true');

                showSuccess('Welcome back, ' + email.split('@')[0] + '!');
                setTimeout(() => { window.location.href = "/"; }, 1000);
            } else {
                showError(data.message || 'Invalid credentials!');
                setLoading(false);
            }
        } catch (error) {
            showError('Network error. Please try again.');
            setLoading(false);
        }
    });

    // Other helper functions
    function showForgotPassword() {
        const email = document.getElementById('email').value.trim();
        if (email) {
            showSuccess(`Password reset link sent to ${email}! (Demo)`);
        } else {
            showError('Please enter your email first');
        }
    }

    function showSignupAlert() {
        showError('Signup coming soon! Try demo@nexus.ai / any password');
    }

    // Auto-login check & remember me
    window.addEventListener('load', function() {
        const user = localStorage.getItem('user');
        if (user && window.location.pathname === '/login') {
            if (confirm(`Already logged in as ${user}. Go to home?`)) {
                window.location.href = '/';
            }
        }

        const rememberMe = localStorage.getItem('rememberMe');
        const savedEmail = localStorage.getItem('userEmail');
        if (rememberMe === 'true' && savedEmail) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('rememberMe').checked = true;
        }
    });
</script>
</body>
</html>
